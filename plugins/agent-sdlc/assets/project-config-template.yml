projectName: "{{PROJECT_NAME}}"
defaultBase: {{DEFAULT_BASE}}

commands:
{{VERIFY_COMMANDS}}

github:
  issues: true
  labels:
    ready: "agent:ready"
    active: "agent:active"
    blocked: "agent:blocked"
    review: "agent:review"
    speculative: "agent:speculative"
    needsHuman: "needs-human"
    fullCi: "full-ci"
    readyToMerge: "ready-to-merge"
    stacked: "stacked"

ci:
{{CI_FAST_CHECKS}}
  integration:
    labels:
      fullCi: "full-ci"
      readyToMerge: "ready-to-merge"
    mergeQueue: true
    mergeGroup: true
  humanReviewRisks:
    - auth
    - data
    - migration
    - security
    - public-api
    - billing
  riskyPaths:
    native:
      - ios/**
      - android/**
    data:
      - db/**
      - migrations/**
    infra:
      - .github/workflows/**

workflow:
  maxActiveIssues: 5
  requireIssueBeforeImplementation: true
  defaultBranchType: short-lived
  allowSpeculativeBranches: true

merge:
  mode: auto
  requireHumanFor:
    - auth
    - data
    - migration
    - security
    - public-api
    - billing

threads:
  reviewer:
    mode: reuse-or-create
    title: "Reviewer: {{PROJECT_NAME}}"
  docs:
    mode: reuse-or-create
    title: "Docs: {{PROJECT_NAME}}"

review:
  maxCycles: 2
  requireCleanWorkingTree: false
  requireInlineFindings: true
